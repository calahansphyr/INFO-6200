<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>{% block title %}Personal Library{% endblock %}</title>
    <style>
      :root {
        --bg: #f3f4f6;
        --bg-card: #ffffff;
        --accent: #2563eb;
        --accent-soft: rgba(37, 99, 235, 0.08);
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --success: #16a34a;
        --radius-lg: 16px;
        --radius-md: 10px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #e5edff 0, #eef2ff 40%, #f9fafb 100%);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 2rem 1rem;
      }

      .app-shell {
        width: 100%;
        max-width: 960px;
        background: linear-gradient(145deg, #ffffff 0, #f9fafb 50%, #ffffff 100%);
        border-radius: 24px;
        border: 1px solid rgba(209, 213, 219, 0.8);
        box-shadow:
          0 18px 45px rgba(15, 23, 42, 0.08),
          0 0 0 1px rgba(255, 255, 255, 0.8);
        overflow: hidden;
      }

      header {
        padding: 1.1rem 1.75rem;
        border-bottom: 1px solid rgba(229, 231, 235, 0.9);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(135deg, #eff6ff, #eef2ff);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .brand-logo {
        width: 32px;
        height: 32px;
        border-radius: 11px;
        background: conic-gradient(
          from 200deg,
          #60a5fa,
          #34d399,
          #fbbf24,
          #60a5fa
        );
        position: relative;
        box-shadow:
          0 0 0 1px rgba(148, 163, 184, 0.5),
          0 0 30px rgba(96, 165, 250, 0.5);
      }

      .brand-logo::after {
        content: "";
        position: absolute;
        inset: 5px;
        border-radius: inherit;
        background: radial-gradient(circle at top, #eff6ff, #ffffff);
      }

      .brand-text h1 {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #111827;
      }

      .brand-text span {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
      }

      nav {
        display: flex;
        gap: 0.5rem;
      }

      .nav-link {
        font-size: 0.85rem;
        padding: 0.45rem 0.95rem;
        border-radius: 999px;
        border: 1px solid transparent;
        color: var(--muted);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: transparent;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          transform 0.1s ease;
      }

      .nav-link:hover {
        background: rgba(255, 255, 255, 0.9);
        border-color: rgba(209, 213, 219, 0.9);
        color: #111827;
        transform: translateY(-1px);
      }

      .nav-link.primary {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        border-color: transparent;
        color: #f9fafb;
        font-weight: 600;
        box-shadow:
          0 0 0 1px rgba(37, 99, 235, 0.4),
          0 10px 30px rgba(37, 99, 235, 0.4);
      }

      .nav-link.primary:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        transform: translateY(-1px) scale(1.01);
      }

      main {
        padding: 1.75rem;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 1rem;
        margin-bottom: 1.25rem;
      }

      .page-header h2 {
        margin: 0;
        font-size: 1.3rem;
      }

      .page-header p {
        margin: 0.25rem 0 0;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
        padding: 0.3rem 0.8rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid rgba(37, 99, 235, 0.4);
      }

      .card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        border: 1px solid rgba(229, 231, 235, 0.9);
        padding: 1.25rem 1.5rem;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
      }

      .card + .card {
        margin-top: 1.25rem;
      }

      .card h3 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
      }

      .muted {
        color: var(--muted);
        font-size: 0.9rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.5rem;
      }

      thead {
        background: #eff6ff;
      }

      th,
      td {
        padding: 0.6rem 0.75rem;
        font-size: 0.85rem;
        text-align: left;
        border-bottom: 1px solid #e5e7eb;
      }

      th {
        font-weight: 600;
        color: #1f2937;
      }

      tbody tr:nth-child(even) {
        background: #f9fafb;
      }

      tbody tr:hover {
        background: #eef2ff;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 2.25rem;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-variant-numeric: tabular-nums;
        background: #eff6ff;
        color: #1f2937;
      }

      .status-pill {
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.75rem;
      }

      .status-pill.read {
        background: rgba(34, 197, 94, 0.08);
        color: var(--success);
        border: 1px solid rgba(34, 197, 94, 0.4);
      }

      .status-pill.unread {
        background: rgba(148, 163, 184, 0.15);
        color: var(--muted);
        border: 1px solid rgba(148, 163, 184, 0.5);
      }

      .rating {
        font-variant-numeric: tabular-nums;
      }

      .rating::after {
        content: "★";
        margin-left: 0.1rem;
        font-size: 0.8em;
        color: #f59e0b;
      }

      .empty {
        color: var(--muted);
      }

      form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem 1.25rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        font-size: 0.85rem;
      }

      .field label {
        color: var(--muted);
      }

      .field input[type="text"],
      .field input[type="number"] {
        border-radius: var(--radius-md);
        border: 1px solid #d1d5db;
        background: #f9fafb;
        padding: 0.45rem 0.6rem;
        color: var(--text);
        font-size: 0.9rem;
      }

      .field input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
        background: #ffffff;
      }

      .field-inline {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .actions {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        margin-top: 0.25rem;
      }

      .btn {
        border-radius: 999px;
        padding: 0.4rem 0.9rem;
        border: 1px solid transparent;
        font-size: 0.85rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        text-decoration: none;
      }

      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: #f9fafb;
        font-weight: 600;
        box-shadow:
          0 0 0 1px rgba(37, 99, 235, 0.45),
          0 10px 30px rgba(37, 99, 235, 0.35);
      }

      .btn-secondary {
        background: #ffffff;
        color: var(--muted);
        border-color: #d1d5db;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      @media (max-width: 720px) {
        main {
          padding: 1.25rem;
        }

        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.75rem;
        }

        form {
          grid-template-columns: 1fr;
        }

        .page-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header>
        <div class="brand">
          <div class="brand-logo" aria-hidden="true"></div>
          <div class="brand-text">
            <h1>Personal Library</h1>
            <span>Track your reading at a glance</span>
          </div>
        </div>
        <nav aria-label="Main">
          <a href="{{ url_for('index') }}" class="nav-link">Overview</a>
          <a href="{{ url_for('list_books') }}" class="nav-link">All Books</a>
          <a href="{{ url_for('add') }}" class="nav-link primary">Add Book</a>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
