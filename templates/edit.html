{% extends "base.html" %}

{% block title %}Edit Book · Personal Library{% endblock %}

{% block content %}
  <div class="page-header">
    <div>
      <h2>Edit Book</h2>
      <p>Update the details of your book.</p>
    </div>
  </div>

  <section class="card">
    <h3>Book Details</h3>
    <form method="post" action="{{ url_for('edit_book', item_id=book.id) }}">
      <div class="field">
        <label for="isbn">ISBN</label>
        <input type="text" id="isbn" name="isbn" value="{{ book.isbn }}" placeholder="978…" />
      </div>

      <div class="field">
        <label for="title">Title *</label>
        <input type="text" id="title" name="title" required value="{{ book.title }}" placeholder="The Hobbit" />
      </div>

      <div class="field">
        <label for="author">Author *</label>
        <input type="text" id="author" name="author" required value="{{ book.author }}" placeholder="J.R.R. Tolkien" />
      </div>

      <div class="field">
        <label for="genre">Genre</label>
        <input type="text" id="genre" name="genre" value="{{ book.genre }}" placeholder="Fantasy" />
      </div>

      <div class="field">
        <label for="pages">Pages</label>
        <input type="number" id="pages" name="pages" min="0" value="{{ book.pages }}" placeholder="366" />
      </div>

      <div class="field">
        <label for="rating">Rating (0–5)</label>
        <input
          type="number"
          id="rating"
          name="rating"
          step="0.1"
          min="0"
          max="5"
          value="{{ '%.1f'|format(book.rating) if book.rating else '' }}"
          placeholder="4.5"
        />
      </div>

      <div class="field-inline">
        <input type="checkbox" id="is_read" name="is_read" {% if book.is_read %}checked{% endif %} />
        <label for="is_read">I have finished this book</label>
      </div>

      <div class="actions">
        <a href="{{ url_for('list_books') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
    <p class="muted" style="margin-top: 0.75rem;">
      Fields marked with * are required.
    </p>
  </section>
{% endblock %}
