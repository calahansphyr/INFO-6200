{% extends "base.html" %}

{% block title %}Add Book · Personal Library{% endblock %}

{% block content %}
  <div class="page-header">
    <div>
      <h2>Add a Book</h2>
      <p>Fill in the details to add a new title to your library.</p>
    </div>
  </div>

  <section class="card">
    <h3>Book Details</h3>
    <form method="post" action="{{ url_for('add') }}">
      <div class="field">
        <label for="isbn">ISBN</label>
        <input type="text" id="isbn" name="isbn" placeholder="978…" />
      </div>

      <div class="field">
        <label for="title">Title *</label>
        <input type="text" id="title" name="title" required placeholder="The Hobbit" />
      </div>

      <div class="field">
        <label for="author">Author *</label>
        <input type="text" id="author" name="author" required placeholder="J.R.R. Tolkien" />
      </div>

      <div class="field">
        <label for="genre">Genre</label>
        <input type="text" id="genre" name="genre" placeholder="Fantasy" />
      </div>

      <div class="field">
        <label for="pages">Pages</label>
        <input type="number" id="pages" name="pages" min="0" placeholder="366" />
      </div>

      <div class="field">
        <label for="rating">Rating (0–5)</label>
        <input
          type="number"
          id="rating"
          name="rating"
          step="0.1"
          min="0"
          max="5"
          placeholder="4.5"
        />
      </div>

      <div class="field-inline">
        <input type="checkbox" id="is_read" name="is_read" />
        <label for="is_read">I have finished this book</label>
      </div>

      <div class="actions">
        <a href="{{ url_for('list_books') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Book</button>
      </div>
    </form>
    <p class="muted" style="margin-top: 0.75rem;">
      Fields marked with * are required.
    </p>
  </section>
{% endblock %}
